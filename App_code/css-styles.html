<style>
  /* Tipografía Global */
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');

  :root {
    /* PALETA DE COLORES ASMET SALUD */

    /* Primarios */
    --color-teal: rgb(32, 142, 143);
    /* Un teal más profundo y corporativo */
    --color-red: rgb(217, 33, 39);
    /* #D92127 (Acento/Alerta) */
    --color-teal-dark: rgb(23, 105, 106);
    --color-teal-light: rgb(75, 172, 172);

    /* Complementarios */
    --color-white: rgb(255, 255, 255);
    --color-lightblue: rgb(224, 242, 241);
    /* Verde agua muy claro para fondos suaves */
    --color-aqua: rgb(102, 187, 186);

    /* Mapeo al Sistema de Diseño */
    --primary-color: var(--color-teal);
    --primary-dark: var(--color-teal-dark);
    --secondary-color: var(--color-red);

    /* Fondos y UI */
    --body-bg: #f8fafc;
    /* Gris azulado muy tenue, más limpio */
    --card-bg: rgba(255, 255, 255, 0.95);
    --input-border: #cbd5e1;
    --input-focus: var(--color-teal);

    /* Superficies Glassmorphism */
    --glass-border: rgba(32, 142, 143, 0.15);
    --glass-shadow: 0 8px 32px 0 rgba(32, 142, 143, 0.05);

    /* Colores de Alerta (Mantenidos para compatibilidad) */
    --success-bg: #d1fae5;
    --success-text: #065f46;
    --error-bg: #fee2e2;
    --error-text: #991b1b;
    --warning-bg: #ffedd5;
    --warning-text: #9a3412;

    /* Compatibilidad Legacy */
    --primary: var(--primary-color);
    --secondary: var(--secondary-color);
    --light-blue: var(--color-lightblue);
  }

  * {
    box-sizing: border-box;
  }

  body {
    font-family: 'Inter', sans-serif;
    background-color: var(--body-bg);
    background-image:
      radial-gradient(at 0% 0%, hsla(177, 41%, 89%, 1) 0, transparent 50%),
      radial-gradient(at 100% 100%, hsla(178, 41%, 94%, 1) 0, transparent 50%);
    background-attachment: fixed;
    min-height: 100vh;
    margin: 0;
    padding: 0;
    color: #334155;
    -webkit-font-smoothing: antialiased;
  }

  /* Contenedor Principal */
  .main-container {
    max-width: 1200px;
    margin: 2rem auto;
    padding: 0 1rem;
  }

  /* Cards / Tarjetas Generales - Glassmorphism Mejorado */
  .glass-card,
  .card-test {
    background: var(--card-bg);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border: 1px solid var(--glass-border);
    padding: 2rem;
    border-radius: 1rem;
    box-shadow: var(--glass-shadow);
    margin-bottom: 2rem;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .glass-card:hover,
  .card-test:hover {
    box-shadow: 0 12px 24px -8px rgba(32, 142, 143, 0.25);
    transform: translateY(-3px);
    border-color: rgba(32, 142, 143, 0.3);
  }

  /* Encabezados unificados */
  .page-header {
    text-align: center;
    margin-bottom: 2rem;
    color: var(--primary-color);
  }

  .page-header h1 {
    font-size: 2.5rem;
    font-weight: 700;
    margin-bottom: 0.5rem;
    color: var(--color-teal);
  }

  .page-header p {
    color: #64748b;
    font-size: 1.1rem;
  }

  /* Botones Estándar Mejorados */
  .btn-primary {
    background: linear-gradient(135deg, var(--primary-color) 0%, var(--primary-dark) 100%);
    color: white;
    border: none;
    padding: 0.75rem 1.5rem;
    border-radius: 0.75rem;
    /* Más redondeado y moderno */
    font-weight: 600;
    letter-spacing: 0.025em;
    cursor: pointer;
    transition: all 0.3s ease;
    text-decoration: none;
    display: inline-block;
    box-shadow: 0 4px 12px rgba(32, 142, 143, 0.25);
  }

  .btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 16px rgba(32, 142, 143, 0.35);
    background: linear-gradient(135deg, var(--color-teal-light) 0%, var(--primary-color) 100%);
  }

  .btn-primary:active {
    transform: translateY(1px);
    box-shadow: 0 2px 4px rgba(32, 142, 143, 0.2);
  }

  .btn-secondary {
    background: rgba(255, 255, 255, 0.8);
    backdrop-filter: blur(4px);
    color: var(--primary-color);
    border: 1.5px solid var(--primary-color);
    padding: 0.6rem 1.25rem;
    border-radius: 0.75rem;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s ease;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
  }

  .btn-secondary:hover {
    background: var(--primary-color);
    color: white;
    box-shadow: 0 4px 10px rgba(32, 142, 143, 0.2);
  }

  /* Inputs Estándar */
  .input-std,
  .inp {
    width: 100%;
    padding: 0.75rem 1rem;
    border: 1.5px solid var(--input-border);
    border-radius: 0.75rem;
    font-size: 1rem;
    color: #1e293b;
    transition: all 0.25s ease;
    background: rgba(255, 255, 255, 0.9);
    outline: none;
  }

  .input-std:focus,
  .inp:focus {
    border-color: var(--primary-color);
    box-shadow: 0 0 0 4px rgba(32, 142, 143, 0.15);
    background: #ffffff;
  }

  /* Input personalizado para numeros grandes (quita spinner) */
  input[type=number]::-webkit-inner-spin-button,
  input[type=number]::-webkit-outer-spin-button {
    -webkit-appearance: none;
    margin: 0;
  }

  /* Etiquetas */
  .lbl {
    display: block;
    font-size: 0.85rem;
    font-weight: 600;
    color: #475569;
    margin-bottom: 0.35rem;
    text-transform: uppercase;
    letter-spacing: 0.025em;
  }

  /* Utilidades */
  .visible {
    display: block !important;
    animation: fadeIn 0.5s ease;
  }

  .hidden {
    display: none !important;
  }

  @keyframes fadeIn {
    from {
      opacity: 0;
      transform: translateY(10px);
    }

    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  @keyframes spin {
    0% {
      transform: rotate(0deg);
    }

    100% {
      transform: rotate(360deg);
    }
  }

  /* Header border antiguo */
  .header-border {
    border-color: var(--color-teal) !important;
  }

  /* Alertas */
  .alert {
    padding: 1rem;
    border-radius: 0.5rem;
    margin-bottom: 1rem;
    font-weight: 500;
  }

  .alert-error {
    background: var(--error-bg);
    color: var(--error-text);
    border-left: 4px solid var(--color-red);
  }

  .alert-success {
    background: var(--success-bg);
    color: var(--success-text);
    border-left: 4px solid var(--color-teal);
  }

  /* Ajustes impresión */
  @media print {
    body {
      background: white !important;
      color: black !important;
      background-image: none !important;
    }

    .no-print {
      display: none !important;
    }

    .glass-card,
    .card-test {
      box-shadow: none !important;
      border: none !important;
      padding: 0 !important;
    }
  }
</style>
